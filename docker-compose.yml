services:

  db:
    image: postgres:17-alpine
    container_name: beautysalon-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: beautysalondb
      POSTGRES_USER: ${DB_USERNAME:-salon_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-salon_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-salon_user} -d beautysalondb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: beautysalon-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod,seed
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: beautysalondb
      DB_USERNAME: ${DB_USERNAME:-salon_user}
      DB_PASSWORD: ${DB_PASSWORD:-salon_pass}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}

volumes:
  postgres_data:
